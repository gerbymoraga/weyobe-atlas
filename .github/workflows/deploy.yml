# Deploy ATLAS to DigitalOcean when main is updated.
#
# Secrets live on a GitHub Environment (not only repo secrets):
#   Settings → Environments → <name> → Environment secrets
#
# Required secrets on that environment:
#   DROPLET_HOST     — e.g. 167.172.135.40
#   DROPLET_USER     — e.g. deploy
#   DROPLET_SSH_KEY  — private key for that user (full PEM)
#   DROPLET_PATH     — absolute path to the clone, e.g. /home/deploy/apps/weyobe-atlas
#
# Optional:
#   DROPLET_PORT     — SSH port (default 22)
#
# IMPORTANT: job `environment:` below must match your Environment name exactly.
# Default below is `production`. Change it if you named the env differently.
#
# One-time server + secrets setup: see deploy/SETUP_CICD.md

name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Must match Settings → Environments → name (where you stored the secrets)
    environment: production

    steps:
      - name: Verify deploy secrets
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DROPLET_PATH: ${{ secrets.DROPLET_PATH }}
        run: |
          set -euo pipefail
          missing=0
          for name in DROPLET_HOST DROPLET_USER DROPLET_SSH_KEY DROPLET_PATH; do
            # Indirect expand without printing values
            eval "val=\${$name}"
            if [ -z "$val" ]; then
              echo "ERROR: secret $name is empty."
              echo "       Put it on the GitHub Environment named in jobs.deploy.environment"
              echo "       (Settings → Environments), or change environment: in deploy.yml to match."
              missing=1
            else
              echo "OK: $name is set (${#val} chars)"
            fi
          done
          exit "$missing"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DROPLET_PATH }}"
            if [ -z "$APP_DIR" ]; then
              echo "ERROR: DROPLET_PATH secret is empty"
              exit 1
            fi
            cd "$APP_DIR"
            chmod +x deploy/remote-deploy.sh deploy/restart.sh deploy/start-api.sh
            ./deploy/remote-deploy.sh

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            curl -sf "http://127.0.0.1:8000/health" >/dev/null
            echo "API health OK"
            if [ -f /var/www/atlas/index.html ]; then
              echo "Web root OK (/var/www/atlas)"
            else
              echo "ERROR: missing /var/www/atlas/index.html"
              exit 1
            fi
