# Production nginx for ATLAS (static web + API proxy)
#
# On the droplet:
#   cd /path/to/ATLAS/apps/web && npm ci && npm run build
#   sudo cp deploy/nginx-atlas.conf /etc/nginx/sites-available/atlas
#   # edit root path below if your clone location differs
#   sudo ln -sf /etc/nginx/sites-available/atlas /etc/nginx/sites-enabled/atlas
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# API must be running:
#   uvicorn app.main:app --host 127.0.0.1 --port 8000
#
# Web env: VITE_API_URL=/api  (then rebuild)

server {
    listen 80;
    server_name 167.172.135.40;

    client_max_body_size 20M;

    # Built frontend (NOT Vite dev — that breaks CSS behind nginx)
    root /home/deploy/apps/ATLAS/apps/web/dist;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api {
        return 301 /api/;
    }

    # /api/docs → :8000/docs , /api/auth/login → :8000/auth/login
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;
    }
}
